<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}BiharSeva Admin{% endblock %}</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'bihar-green': '#10B981',
                        'bihar-blue': '#3B82F6',
                        'bihar-dark': '#1F2937',
                    }
                }
            }
        }
    </script>
    
    <!-- Font Awesome -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style type="text/tailwindcss">
        body { font-family: 'Inter', sans-serif; }
        .sidebar-link {
            @apply flex items-center px-4 py-3 text-slate-300 hover:bg-slate-800 hover:text-white rounded-lg transition-colors;
        }
        .sidebar-link.active {
            @apply bg-bihar-green text-white hover:bg-emerald-600;
        }
    </style>
</head>
<body class="bg-slate-50 flex h-screen overflow-hidden">
    
    <!-- Sidebar -->
    <aside class="w-64 bg-slate-900 h-full flex flex-col shadow-2xl flex-shrink-0">
        <div class="h-20 flex items-center px-6 border-b border-slate-800">
            <a href="{% url 'admin_dashboard' %}" class="flex items-center space-x-3">
                <div class="w-10 h-10 bg-emerald-500 rounded-lg flex items-center justify-center">
                    <i class="fas fa-leaf text-white transition-transform"></i>
                </div>
                <span class="text-xl font-bold text-white tracking-wide">Panel</span>
            </a>
        </div>
        
        <nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto">
            <a href="{% url 'admin_dashboard' %}" class="sidebar-link {% if request.resolver_match.url_name == 'admin_dashboard' %}active{% endif %}">
                <i class="fas fa-chart-pie w-6"></i> Dashboard
            </a>
            <a href="{% url 'admin_reports' %}" class="sidebar-link {% if request.resolver_match.url_name == 'admin_reports' %}active{% endif %}">
                <i class="fas fa-flag w-6"></i> Reports
            </a>
            <a href="{% url 'admin_volunteers' %}" class="sidebar-link {% if request.resolver_match.url_name == 'admin_volunteers' %}active{% endif %}">
                <i class="fas fa-users w-6"></i> Volunteers
            </a>
            <a href="{% url 'admin_events' %}" class="sidebar-link {% if request.resolver_match.url_name == 'admin_events' or request.resolver_match.url_name == 'admin_event_attendance' %}active{% endif %}">
                <i class="fas fa-calendar-alt w-6"></i> Events
            </a>
            <a href="{% url 'admin_certificates' %}" class="sidebar-link {% if request.resolver_match.url_name == 'admin_certificates' %}active{% endif %}">
                <i class="fas fa-award w-6"></i> Certificates
            </a>
        </nav>
        
        <div class="p-4 border-t border-slate-800">
            <a href="{% url 'home' %}" class="flex items-center px-4 py-3 text-sm text-slate-400 hover:text-white transition-colors">
                <i class="fas fa-external-link-alt w-6"></i> View Live Site
            </a>
            <a href="/admin/logout/" class="flex items-center px-4 py-3 text-sm text-rose-400 hover:bg-rose-500/10 hover:text-rose-300 rounded-lg transition-colors mt-2">
                <i class="fas fa-sign-out-alt w-6"></i> Logout
            </a>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-full overflow-hidden relative">
        <!-- Header -->
        <header class="bg-white h-20 shadow-sm flex items-center justify-between px-8 z-10 flex-shrink-0">
            <h1 class="text-2xl font-bold text-slate-800">{% block header_title %}Dashboard{% endblock %}</h1>
            <div class="flex items-center space-x-4">
                <span class="text-sm font-medium text-slate-600 bg-slate-100 px-3 py-1.5 rounded-full">
                    <i class="fas fa-user-shield mr-2 text-emerald-600"></i>{{ request.user.username|default:"Admin" }}
                </span>
            </div>
        </header>

        <!-- Messages -->
        {% if messages %}
            <div class="absolute top-24 right-8 z-50 max-w-sm w-full space-y-2">
                {% for message in messages %}
                    <div class="p-4 rounded-xl shadow-lg border-l-4 flex justify-between items-start {% if message.tags == 'success' %}bg-emerald-50 border-emerald-500 text-emerald-800{% elif message.tags == 'warning' %}bg-amber-50 border-amber-500 text-amber-800{% elif message.tags == 'info' %}bg-blue-50 border-blue-500 text-blue-800{% else %}bg-red-50 border-red-500 text-red-800{% endif %}">
                        <span class="font-medium text-sm">{{ message }}</span>
                        <button onclick="this.parentElement.remove()" class="text-slate-400 hover:text-slate-600"><i class="fas fa-times"></i></button>
                    </div>
                {% endfor %}
            </div>
        {% endif %}

        <!-- Content Area -->
        <div class="flex-1 overflow-y-auto bg-slate-50 p-8">
            {% block content %}{% endblock %}
        </div>
    </main>

</body>
</html>
