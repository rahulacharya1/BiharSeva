<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}BiharSeva - Clean Bihar Movement{% endblock %}</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'bihar-green': '#10B981',
                        'bihar-blue': '#3B82F6',
                        'bihar-dark': '#1F2937',
                    },
                    boxShadow: {
                        'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.05)',
                    }
                }
            }
        }
    </script>

    <!-- Font Awesome & Google Fonts -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Inter', sans-serif; }
        .input-field {
            @apply w-full px-4 py-3 rounded-xl border border-gray-200 focus:ring-2 focus:ring-bihar-green focus:border-transparent transition-all outline-none bg-white/50 backdrop-blur-sm;
        }
        .btn-primary {
            @apply bg-bihar-green hover:bg-emerald-600 text-white font-semibold py-3 px-6 rounded-xl transition-all transform hover:scale-[1.02] active:scale-[0.98] shadow-lg shadow-emerald-200;
        }
    </style>
</head>
<body class="bg-[#F8FAFC] text-slate-800 min-h-screen flex flex-col">
    
    <!-- Navbar Include -->
    {% include 'header.html' %}
    
    <main class="flex-grow">
        <!-- Messages System -->
        {% if messages %}
            <div class="fixed top-24 right-4 z-50 max-w-md w-full space-y-3">
                {% for message in messages %}
                    <div class="{% if message.tags == 'success' %}bg-emerald-50 border-emerald-500 text-emerald-800{% else %}bg-red-50 border-red-500 text-red-800{% endif %} border-l-4 p-4 rounded-xl shadow-xl flex items-center justify-between animate-bounce-short">
                        <div class="flex items-center">
                            {% if message.tags == 'success' %}
                                <i class="fas fa-check-circle mr-3 text-emerald-500"></i>
                            {% else %}
                                <i class="fas fa-exclamation-circle mr-3 text-red-500"></i>
                            {% endif %}
                            <p class="text-sm font-medium">{{ message }}</p>
                        </div>
                        <button onclick="this.parentElement.remove()" class="text-slate-400 hover:text-slate-600">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                {% endfor %}
            </div>
        {% endif %}

        <!-- Content Block -->
        <div class="animate-fade-in">
            {% block content %}{% endblock %}
        </div>
    </main>
    
    <!-- Footer Include -->
    {% include 'footer.html' %}

    <!-- Common Scripts -->
    <script>
        // Simple fade-in animation for page content
        document.addEventListener('DOMContentLoaded', () => {
            const main = document.querySelector('main');
            main.classList.add('opacity-100');
        });
    </script>

    <style>
        @keyframes bounce-short {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        .animate-bounce-short { animation: bounce-short 1s ease-in-out; }
    </style>
</body>
</html>
